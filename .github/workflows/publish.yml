name: Publish stable

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Ensure the tagged commit lives on master
      - name: Verify tag is on master
        run: |
          TAG_SHA=$(git rev-parse HEAD)
          if ! git branch -r --contains "$TAG_SHA" | grep -q 'origin/master'; then
            echo "::error::Tag must point to a commit on master. Aborting."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - run: npm run build

      - run: npm test

      - run: npm publish --provenance --access public
