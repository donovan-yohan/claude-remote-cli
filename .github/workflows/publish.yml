name: Publish to npm

on:
  push:
    tags:
      - 'v*'
    branches:
      - nightly

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # For stable releases: verify tag is on master
      - name: Verify tag is on master
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_SHA=$(git rev-parse HEAD)
          if ! git branch -r --contains "$TAG_SHA" | grep -q 'origin/master'; then
            echo "::error::Tag must point to a commit on master. Aborting."
            exit 1
          fi

      # For nightly: stamp a prerelease version
      - name: Set nightly version
        if: github.ref == 'refs/heads/nightly'
        run: |
          BASE=$(node -p "require('./package.json').version")
          STAMP=$(date -u +%Y%m%d)
          NIGHTLY="${BASE}-nightly.${STAMP}.${GITHUB_RUN_NUMBER}"
          npm version "$NIGHTLY" --no-git-tag-version
          echo "Publishing nightly version: $NIGHTLY"

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - run: npm run build

      - run: npm test

      # Stable: publish as @latest (default)
      - name: Publish stable
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm publish --provenance --access public

      # Nightly: publish as @nightly
      - name: Publish nightly
        if: github.ref == 'refs/heads/nightly'
        run: npm publish --provenance --access public --tag nightly
